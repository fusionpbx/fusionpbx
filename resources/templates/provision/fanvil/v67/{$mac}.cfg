</VPN_CONFIG_MODULE>

{*
    UI tweaks. fanvil_sidekey_label_length controls how many characters
    of each Side DSS key's label show on screen. Fanvil's firmware
    default is 2 (very compact) — bumping to 7 makes labels like
    "Park 1" / "Office" actually readable. Range 1-10.
*}
<UI_MAINTAIN_CONFIG_MODULE>
<Sidekey_Label_Length>{$fanvil_sidekey_label_length|default:'7'}</Sidekey_Label_Length>
</UI_MAINTAIN_CONFIG_MODULE>

</VOIP_CONFIG_FILE>
