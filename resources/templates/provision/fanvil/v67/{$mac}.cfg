<UPDATE_PB_INTERVAL>720</UPDATE_PB_INTERVAL>
<Contact_Account>1</Contact_Account>
<Clr_PB_B4_Import>1</Clr_PB_B4_Import>
<Config_File_Name>{$mac}.cfg</Config_File_Name>
<Download_Server_IP>{if isset($fanvil_provision_url)}{$fanvil_provision_url}{else}https://{$domain_name}/app/provision{/if}</Download_Server_IP>
