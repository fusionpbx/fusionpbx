<?xml version="1.0" encoding="UTF-8"?>
{*
    Fanvil V63 provisioning template — modern <VOIP_CONFIG_FILE> schema.
    V67 firmware 2.12+ uses the modern <VOIP_CONFIG_FILE> schema
    (NOT the legacy <sysConf> schema some FusionPBX templates still use).
    The DSS keys on the phone's "Side Dsskey" page live in
    <DSSKEY_CONFIG_MODULE>/<Sidekey_ConfigN>, NOT <dsskey>/<dssSide>.
    Capacity: 29 keys per page x 4 pages = 116 side keys total. Type values follow Fanvil DSS:
        0=None, 1=Memory Key (Speed Dial / BLF / Call Park / etc.),
        2=Line, 3=Key Event.
    Memory Key Value format: target@line/typeletter (e.g. *5901@1/c). The
    "park+" prefix is required for BLF-enabled Call Park subscription; this
    template auto-prepends it for type "c" keys whose value lacks it.
*}
<VOIP_CONFIG_FILE>
<Version>2.0003</Version>
<GLOBAL_CONFIG_MODULE>
<CFG_Update_Realtime>1</CFG_Update_Realtime>
<Host_Name>VOIP</Host_Name>

<RTP_Initial_Port>10000</RTP_Initial_Port>
<RTP_Port_Quantity>200</RTP_Port_Quantity>

<SNTP_Server>{if isset($ntp_server_primary)}{$ntp_server_primary}{else}pool.ntp.org{/if}</SNTP_Server>
<Second_SNTP_Server>{if isset($ntp_server_secondary)}{$ntp_server_secondary}{else}pool.ntp.org{/if}</Second_SNTP_Server>
<Enable_SNTP>{if isset($fanvil_enable_sntp)}{$fanvil_enable_sntp}{else}1{/if}</Enable_SNTP>

<Time_Zone>{if isset($fanvil_time_zone)}{$fanvil_time_zone}{else}-20{/if}</Time_Zone>
<Time_Zone_Name>{if isset($fanvil_time_zone_name)}{$fanvil_time_zone_name}{else}UTC-5{/if}</Time_Zone_Name>
<Location>{if isset($fanvil_location)}{$fanvil_location}{else}4{/if}</Location>
<Enable_DST>{if isset($fanvil_enable_dst)}{$fanvil_enable_dst}{else}1{/if}</Enable_DST>
<DST_Type>1</DST_Type>

<DST_Min_Offset>60</DST_Min_Offset>
<DST_Start_Mon>3</DST_Start_Mon>
<DST_Start_Week>2</DST_Start_Week>
<DST_Start_Wday>0</DST_Start_Wday>
<DST_Start_Hour>2</DST_Start_Hour>
<DST_Start_Min>00</DST_Start_Min>
<DST_End_Mon>11</DST_End_Mon>
<DST_End_Week>1</DST_End_Week>
<DST_End_Wday>0</DST_End_Wday>
<DST_End_Hour>2</DST_End_Hour>
<DST_End_Min>00</DST_End_Min>

<Default_UI>en</Default_UI>
<Language>0</Language>
</GLOBAL_CONFIG_MODULE>

<MM_CONFIG_MODULE>
<RTP_Keep_Alive>1</RTP_Keep_Alive>
<RTP_Relay>1</RTP_Relay>
<PHONE_CONFIG>
<PHONE_CONFIG_Entry>
<Video_Codec_Sets>{if isset($fanvil_video_codec)}{$fanvil_video_codec}{else}H264{/if}</Video_Codec_Sets>
</PHONE_CONFIG_Entry>
</PHONE_CONFIG>
</MM_CONFIG_MODULE>

<TELE_CONFIG_MODULE>
<Onhook_to_BXfer>1</Onhook_to_BXfer>
<Onhook_to_AXfer>0</Onhook_to_AXfer>
<Memory_Key_to_BXfer>1</Memory_Key_to_BXfer>
<Main_Digit_Prefix></Main_Digit_Prefix>
{*
    Basic dial-plan timing knobs. fanvil_dial_by_pound lets the user press
    "#" to send immediately. fanvil_dial_timeout is the auto-send delay
    after the last digit if no dial-plan rule matches (3s is much snappier
    than the 10s default).
*}
<Dial_by_Pound>{if isset($fanvil_dial_by_pound)}{$fanvil_dial_by_pound}{else}1{/if}</Dial_by_Pound>
<Dial_by_Timeout>1</Dial_by_Timeout>
<Dial_Timeout_value>{if isset($fanvil_dial_timeout)}{$fanvil_dial_timeout}{else}3{/if}</Dial_Timeout_value>
<Dial_Fixed_Length>0</Dial_Fixed_Length>
<Port_Config>
<Port_Config_Entry>
<ID>P1</ID>
<Enable_DND>1</Enable_DND>
<CallSemiXfer>0</CallSemiXfer>
<Port_Ext_Num></Port_Ext_Num>
<SRV_Record_Num></SRV_Record_Num>
<Use_SRV_Record>0</Use_SRV_Record>
<Auto_Onhook_Time>1</Auto_Onhook_Time>
<DND_Code>480</DND_Code>
<Busy_Code>486</Busy_Code>
<Reject_Code>486</Reject_Code>
<CID_Prioiry>1</CID_Prioiry>
<Disp_num_with_na>0</Disp_num_with_na>
</Port_Config_Entry>
</Port_Config>
<Default_Ext_line>0</Default_Ext_line>
</TELE_CONFIG_MODULE>

<CALL_FEATURE_MODULE>
<Port_Config>
<Port_Config_Entry>
<ID>P1</ID>
<Ring_Priority>0</Ring_Priority>
{*
    fanvil_enable_predial = 0 (recommended) makes the phone auto-dial as
    soon as you touch a digit on the idle screen — closest to Yealink's
    "Dial Now" behavior. Set to 1 to keep classic pre-dial buffer mode.
*}
<Enable_PreDial>{if isset($fanvil_enable_predial)}{$fanvil_enable_predial}{else}0{/if}</Enable_PreDial>
</Port_Config_Entry>
</Port_Config>
{*
    Up to 5 user-defined dial-plan rules. Each rule is auto-send when the
    pattern matches (MatchToSend=1, ApplyToCall=0=outgoing). Patterns use
    Fanvil's syntax: 'x'=any digit, '[2-9]'=digit range. Empty defaults
    are skipped so unused slots don't pollute the phone's table.
    Sensible defaults applied if FusionPBX setting is unset:
      1: [2-9]11              (3-digit service codes 211/311/411/.../911)
      2: 1[2-9]xxxxxxxxx      (US 1+10-digit long-distance)
      3: [2-9]xxxxxxxxx       (US 10-digit local)
      4: (empty — extensions / site-specific)
      5: (empty — international / feature codes)
*}
<Dial_Plan_List>
{$_dp = []}
{$_dp[1] = $fanvil_dialplan_1|default:'[2-9]11'}
{$_dp[2] = $fanvil_dialplan_2|default:'1[2-9]xxxxxxxxx'}
{$_dp[3] = $fanvil_dialplan_3|default:'[2-9]xxxxxxxxx'}
{$_dp[4] = $fanvil_dialplan_4|default:''}
{$_dp[5] = $fanvil_dialplan_5|default:''}
{for $i = 1 to 5}
{if $_dp[$i] != ''}
<Dial_Plan_List_Entry>
<ID>Item{$i}</ID>
<Number>{$_dp[$i]}</Number>
<ApplyToCall>0</ApplyToCall>
<MatchToSend>1</MatchToSend>
<Media>0</Media>
<Line>-1</Line>
<Address></Address>
<Port>0</Port>
<Alias></Alias>
<DelLen>0</DelLen>
<Suffix></Suffix>
</Dial_Plan_List_Entry>
{/if}
{/for}
</Dial_Plan_List>
</CALL_FEATURE_MODULE>

<DSP_CONFIG_MODULE>
<Enable_MWI_Tone>1</Enable_MWI_Tone>
<Onhook_Time>200</Onhook_Time>
<VAD>0</VAD>
<Ring_Type>{if isset($fanvil_default_ringtone)}{$fanvil_default_ringtone}{else}default.wav{/if}</Ring_Type>
<RtpAddr_Check_Mode>1</RtpAddr_Check_Mode>
<RTP_Probe>0</RTP_Probe>
<HD_Voice>1</HD_Voice>
<Port_Config>
<Port_Config_Entry>
<ID>P1</ID>
<General_Spk_Vol>5</General_Spk_Vol>
<HandFree_Vol>5</HandFree_Vol>
<Voice_Codec1>PCMU/8000</Voice_Codec1>
<Voice_Codec2>PCMA/8000</Voice_Codec2>
<Voice_Codec3>G729/8000</Voice_Codec3>
<Voice_Codec4>G722/8000</Voice_Codec4>
<Voice_Codec5></Voice_Codec5>
<Voice_Codec6></Voice_Codec6>
</Port_Config_Entry>
</Port_Config>
<Codec_Config>
<Codec_Config_Entry><ID>Codec1</ID><Format>PCMU/8000;payload=0;</Format></Codec_Config_Entry>
<Codec_Config_Entry><ID>Codec2</ID><Format>PCMA/8000;payload=8;</Format></Codec_Config_Entry>
<Codec_Config_Entry><ID>Codec3</ID><Format>G722/8000;payload=9;</Format></Codec_Config_Entry>
<Codec_Config_Entry><ID>Codec4</ID><Format>G729/8000;payload=18;annexb=no;</Format></Codec_Config_Entry>
<Codec_Config_Entry><ID>Codec5</ID><Format>G723/8000;payload=4;bitrate=6.3;</Format></Codec_Config_Entry>
<Codec_Config_Entry><ID>Codec6</ID><Format>G726-32/8000;payload=2;</Format></Codec_Config_Entry>
<Codec_Config_Entry><ID>Codec7</ID><Format>telephone-event/8000;payload=101;</Format></Codec_Config_Entry>
</Codec_Config>

<Alert_Info_Ring>
<Alert_Info_Ring_Entry><ID>Alert1</ID><Text>ivr</Text><Ring_Type>7.wav</Ring_Type></Alert_Info_Ring_Entry>
<Alert_Info_Ring_Entry><ID>Alert2</ID><Text>external</Text><Ring_Type>2.wav</Ring_Type></Alert_Info_Ring_Entry>
<Alert_Info_Ring_Entry><ID>Alert3</ID><Text>queue</Text><Ring_Type>6.wav</Ring_Type></Alert_Info_Ring_Entry>
<Alert_Info_Ring_Entry><ID>Alert4</ID><Text></Text><Ring_Type>1.wav</Ring_Type></Alert_Info_Ring_Entry>
</Alert_Info_Ring>
</DSP_CONFIG_MODULE>

<SIP_CONFIG_MODULE>
<Notify_Reboot>0</Notify_Reboot>
<CSTA_Enable>1</CSTA_Enable>
<Strict_UA_Match>1</Strict_UA_Match>
<SIP__Port>0</SIP__Port>
<STUN_Server></STUN_Server>
<STUN_Port></STUN_Port>
<STUN_Refresh_Time></STUN_Refresh_Time>
<SIP_Wait_Stun_Time></SIP_Wait_Stun_Time>

<SIP_Line_List>
<SIP_Line_List_Entry>
<ID>SIP1</ID>
<CSTA_Number>{$account.1.user_id}</CSTA_Number>
<Phone_Number>{$account.1.user_id}</Phone_Number>
<Display_Name>{$account.1.display_name}</Display_Name>
<Register_Addr>{$account.1.server_address}</Register_Addr>
<Register_Port>{$account.1.sip_port}</Register_Port>
<Local_Domain>{$account.1.server_address}:{$account.1.sip_port}</Local_Domain>
<Register_User>{$account.1.auth_id}</Register_User>
<Register_Pswd>{$account.1.password}</Register_Pswd>
<Register_TTL>{$account.1.register_expires}</Register_TTL>
<Enable_Reg>{if isset($account.1.password)}1{else}0{/if}</Enable_Reg>
<Proxy_Addr>{if isset($account.1.outbound_proxy_primary)}{$account.1.outbound_proxy_primary}{/if}</Proxy_Addr>
<Proxy_Port>{$account.1.sip_port}</Proxy_Port>
<Proxy_User>{$account.1.auth_id}</Proxy_User>
<Proxy_Pswd>{$account.1.password}</Proxy_Pswd>
<FWD_Timer>60</FWD_Timer>
<Ring_Type>default.wav</Ring_Type>
<NAT_UDPUpdate>1</NAT_UDPUpdate>
<UDPUpdate_TTL>15</UDPUpdate_TTL>
<Server_Type>0</Server_Type>
<User_Agent></User_Agent>
<PRACK>0</PRACK>
<DTMF_Mode>1</DTMF_Mode>
<NAT_Type>0</NAT_Type>
<Enable_Rport>1</Enable_Rport>
<Subscribe>1</Subscribe>
<Sub_Expire>900</Sub_Expire>
<Strict_Proxy>1</Strict_Proxy>
<Direct_Contact>0</Direct_Contact>
<Enable_ChgPort>0</Enable_ChgPort>
<MWI_Num>{if isset($voicemail_number)}{$voicemail_number}{else}*97{/if}</MWI_Num>
<User_Is_Phone>1</User_Is_Phone>
<SvcCode_Mode>1</SvcCode_Mode>
<VoiceCodecMap>G711U,G711A,G722,G729</VoiceCodecMap>
<VideoCodecMap></VideoCodecMap>
<Caller_Id_Type>1</Caller_Id_Type>
<Use_VPN>1</Use_VPN>
<Feature_Sync>1</Feature_Sync>
<Req_With_Port>0</Req_With_Port>
<Unreg_Reboot>0</Unreg_Reboot>
<UnregisterOnBoot>0</UnregisterOnBoot>
{if $account.1.sip_transport == 'udp'}<Transport>0</Transport>{/if}
{if $account.1.sip_transport == 'tcp'}<Transport>1</Transport>{/if}
{if $account.1.sip_transport == 'tls'}<Transport>2</Transport>{/if}
{if $account.1.sip_transport == 'dns srv'}<DNS_SRV>1</DNS_SRV><DNS_Mode>1</DNS_Mode>{/if}
<Sub_CallPark>1</Sub_CallPark>
<BLFDialogMatch>1</BLFDialogMatch>
</SIP_Line_List_Entry>
</SIP_Line_List>
</SIP_CONFIG_MODULE>

<MMI_CONFIG_MODULE>
<Enable_Telnet>0</Enable_Telnet>
<WebServerType>1</WebServerType>
<Web_Authentication>1</Web_Authentication>
<MMI_Account>
<MMI_Account_Entry>
<ID>Account1</ID>
<Name>{if isset($admin_name)}{$admin_name}{else}admin{/if}</Name>
<Password>{if isset($admin_password)}{$admin_password}{else}admin{/if}</Password>
<Level>10</Level>
</MMI_Account_Entry>
<MMI_Account_Entry>
<ID>Account2</ID>
<Name></Name>
<Password></Password>
<Level>0</Level>
</MMI_Account_Entry>
</MMI_Account>
</MMI_CONFIG_MODULE>

<DSSKEY_CONFIG_MODULE>
{*
    DisplayParkedInfo=1 tells the phone to render the dialog event's remote
    caller-id on the parked key label, so a parked call shows the caller's
    number instead of just the park slot (e.g. "1234" instead of "*5901").
    BLFParkedText is the fallback label when no caller-id is available.
*}
<DisplayParkedInfo>1</DisplayParkedInfo>
<BLFParkedColor>1</BLFParkedColor>
<BLFParkedCtl>3</BLFParkedCtl>
<BLFParkedText>parked</BLFParkedText>
{*
    Side DSS keys — V67 has 29 keys per page x 4 pages. Slots without a
    user-configured key are omitted so the phone preserves any factory
    defaults (e.g. F1 = Line/Office for SIP1). For Call Park (c) and
    BLF-family types (bc / bb / ba / bf), if the value starts with '*'
    and lacks "park+", the prefix is auto-prepended so a stored value
    of "*5901" subscribes against the FreeSWITCH park slot correctly.
*}
<Sidekey_Config1>
{for $slot = 1 to 29}
{$gid = $slot + 0}
{if isset($keys["line"][$gid])}
{$row = $keys["line"][$gid]}
{elseif isset($keys["memory"][$gid])}
{$row = $keys["memory"][$gid]}
{elseif isset($keys["programmable"][$gid])}
{$row = $keys["programmable"][$gid]}
{else}
{$row = null}
{/if}
{if $row}
<Sidekey_Config1_Entry>
<ID>Fkey{$slot}</ID>
<Type>{if $row.device_key_type == 3}0{elseif $row.device_key_type == 1}2{else}1{/if}</Type>
<Value>{if $row.device_key_type == 3}{elseif $row.device_key_type == 1}SIP{if $row.device_key_line > 0}{$row.device_key_line}{else}1{/if}{else}{if in_array($row.device_key_type, ['c','bc','bb','ba','bf']) && strpos($row.device_key_value, '*') === 0 && strpos($row.device_key_value, 'park+') !== 0}park+{/if}{$row.device_key_value}@{if $row.device_key_line > 0}{$row.device_key_line}{else}1{/if}/{$row.device_key_type}{/if}</Value>
<Title>{$row.device_key_label}</Title>
</Sidekey_Config1_Entry>
{/if}
{/for}
</Sidekey_Config1>
<Sidekey_Config2>
{for $slot = 1 to 29}
{$gid = $slot + 29}
{if isset($keys["line"][$gid])}
{$row = $keys["line"][$gid]}
{elseif isset($keys["memory"][$gid])}
{$row = $keys["memory"][$gid]}
{elseif isset($keys["programmable"][$gid])}
{$row = $keys["programmable"][$gid]}
{else}
{$row = null}
{/if}
{if $row}
<Sidekey_Config2_Entry>
<ID>Fkey{$slot}</ID>
<Type>{if $row.device_key_type == 3}0{elseif $row.device_key_type == 1}2{else}1{/if}</Type>
<Value>{if $row.device_key_type == 3}{elseif $row.device_key_type == 1}SIP{if $row.device_key_line > 0}{$row.device_key_line}{else}1{/if}{else}{if in_array($row.device_key_type, ['c','bc','bb','ba','bf']) && strpos($row.device_key_value, '*') === 0 && strpos($row.device_key_value, 'park+') !== 0}park+{/if}{$row.device_key_value}@{if $row.device_key_line > 0}{$row.device_key_line}{else}1{/if}/{$row.device_key_type}{/if}</Value>
<Title>{$row.device_key_label}</Title>
</Sidekey_Config2_Entry>
{/if}
{/for}
</Sidekey_Config2>
<Sidekey_Config3>
{for $slot = 1 to 29}
{$gid = $slot + 58}
{if isset($keys["line"][$gid])}
{$row = $keys["line"][$gid]}
{elseif isset($keys["memory"][$gid])}
{$row = $keys["memory"][$gid]}
{elseif isset($keys["programmable"][$gid])}
{$row = $keys["programmable"][$gid]}
{else}
{$row = null}
{/if}
{if $row}
<Sidekey_Config3_Entry>
<ID>Fkey{$slot}</ID>
<Type>{if $row.device_key_type == 3}0{elseif $row.device_key_type == 1}2{else}1{/if}</Type>
<Value>{if $row.device_key_type == 3}{elseif $row.device_key_type == 1}SIP{if $row.device_key_line > 0}{$row.device_key_line}{else}1{/if}{else}{if in_array($row.device_key_type, ['c','bc','bb','ba','bf']) && strpos($row.device_key_value, '*') === 0 && strpos($row.device_key_value, 'park+') !== 0}park+{/if}{$row.device_key_value}@{if $row.device_key_line > 0}{$row.device_key_line}{else}1{/if}/{$row.device_key_type}{/if}</Value>
<Title>{$row.device_key_label}</Title>
</Sidekey_Config3_Entry>
{/if}
{/for}
</Sidekey_Config3>
<Sidekey_Config4>
{for $slot = 1 to 29}
{$gid = $slot + 87}
{if isset($keys["line"][$gid])}
{$row = $keys["line"][$gid]}
{elseif isset($keys["memory"][$gid])}
{$row = $keys["memory"][$gid]}
{elseif isset($keys["programmable"][$gid])}
{$row = $keys["programmable"][$gid]}
{else}
{$row = null}
{/if}
{if $row}
<Sidekey_Config4_Entry>
<ID>Fkey{$slot}</ID>
<Type>{if $row.device_key_type == 3}0{elseif $row.device_key_type == 1}2{else}1{/if}</Type>
<Value>{if $row.device_key_type == 3}{elseif $row.device_key_type == 1}SIP{if $row.device_key_line > 0}{$row.device_key_line}{else}1{/if}{else}{if in_array($row.device_key_type, ['c','bc','bb','ba','bf']) && strpos($row.device_key_value, '*') === 0 && strpos($row.device_key_value, 'park+') !== 0}park+{/if}{$row.device_key_value}@{if $row.device_key_line > 0}{$row.device_key_line}{else}1{/if}/{$row.device_key_type}{/if}</Value>
<Title>{$row.device_key_label}</Title>
</Sidekey_Config4_Entry>
{/if}
{/for}
</Sidekey_Config4>
</DSSKEY_CONFIG_MODULE>

<PHONE_CONFIG_MODULE>
<Menu_Password>{if isset($admin_password)}{$admin_password}{else}admin{/if}</Menu_Password>
<KeyLock_Password>{if isset($admin_password)}{$admin_password}{else}admin{/if}</KeyLock_Password>
<LCD_Title>{$account.1.user_id} | {$account.1.display_name}</LCD_Title>
<BacklightOffTime>{if isset($fanvil_display_inactivity_time)}{$fanvil_display_inactivity_time}{else}30{/if}</BacklightOffTime>
<Enable_Energysaving>1</Enable_Energysaving>
